name: Daily Stock Data Refresh

# Give the workflow permission to write back to the repository.
permissions:
  contents: write

on:
  schedule:
    # 13:00 UTC = 6:30 PM IST, every day.
    - cron: '0 13 * * *'
  workflow_dispatch:        # allows manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        run: python collector.py

      - name: Weekly snapshot (Sundays only)
        run: |
          # Day of week: 7 = Sunday (date +%u). Only snapshot on Sundays.
          if [ "$(date +%u)" = "7" ]; then
            mkdir -p archive
            cp data/tracker.db "archive/tracker_$(date +'%Y-%m-%d').db"
            echo "Snapshot saved for $(date +'%Y-%m-%d')"
          else
            echo "Not Sunday - no snapshot today."
          fi

      - name: Monthly research snapshot (1st of month only)
        run: |
          # Day of month: 01 = first day. Snapshot research notes monthly.
          if [ "$(date +%d)" = "01" ]; then
            mkdir -p archive
            if [ -f research_notes.csv ]; then
              cp research_notes.csv "archive/research_$(date +'%Y-%m-%d').csv"
              echo "Research snapshot saved for $(date +'%Y-%m-%d')"
            else
              echo "No research_notes.csv to snapshot."
            fi
          else
            echo "Not the 1st - no research snapshot today."
          fi

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db
          git add archive/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily refresh + snapshots ($(date +'%Y-%m-%d'))"
          git push
