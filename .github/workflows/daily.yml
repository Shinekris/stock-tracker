name: Daily Stock Data Refresh

# When to run
on:
  schedule:
    # Runs at 13:00 UTC = 6:30 PM IST, every day.
    # (GitHub uses UTC; IST is UTC+5:30, so 13:00 UTC = 18:30 IST.)
    - cron: '0 13 * * *'
  # Also allow running it manually from the Actions tab (handy for testing).
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code from the repo
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install the dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the collector to fetch fresh data + scores
      - name: Run collector
        run: python collector.py

      # 5. Commit the updated database back to the repo
      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Daily data refresh ($(date +'%Y-%m-%d'))"
          git push
