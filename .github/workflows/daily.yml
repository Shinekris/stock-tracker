name: Daily Stock Data Refresh

# Give the workflow permission to write back to the repository.
permissions:
  contents: write

on:
  schedule:
    # 13:00 UTC = 6:30 PM IST, every day.
    - cron: '0 13 * * *'
  workflow_dispatch:        # allows manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        run: python collector.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tracker.db
          git diff --staged --quiet || git commit -m "Daily data refresh ($(date +'%Y-%m-%d'))"
          git push
